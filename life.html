<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>元衍极 | 生活</title>
  <meta name="description" content="元衍极：低频、真实、克制的个人侧面。" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="page">
    <header class="site-header container">
      <div class="brand">
        <a class="logo" href="index.html" aria-label="元衍极">
          <img src="assets/images/logo.svg" alt="元衍极" />
        </a>
        <div class="brand-text">
          <h1 data-i18n="brand.name">元衍极</h1>
          <p class="tagline" data-i18n="brand.tagline">始于一元，衍至无极</p>
        </div>
      </div>
      <nav class="nav" aria-label="Primary">
        <a href="index.html" data-i18n="nav.home">首页</a>
        <a href="about.html" data-i18n="nav.about">关于我</a>
        <a href="blog.html" data-i18n="nav.blog">博客文章</a>
        <a href="academic.html" data-i18n="nav.academic">学术</a>
        <a href="life.html" class="active" data-i18n="nav.life">生活</a>
        <a href="contact.html" data-i18n="nav.contact">联系方式</a>
      </nav>
      <div class="header-actions">
        <button class="toggle" id="theme-toggle" aria-label="Toggle theme">日</button>
        <div class="lang-switch" role="group" aria-label="Language">
          <button data-lang="zh" class="active">中</button>
          <button data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <main class="main container">
      <section class="hero hero--compact">
        <div class="hero-content reveal">
          <p class="eyebrow" data-i18n="life.eyebrow">Life</p>
          <h2 data-i18n="life.title">首先，好好生活。</h2>
          <p class="lead" data-i18n="life.subtitle">记录短而收敛的观察，不追热点。</p>
        </div>
      </section>

      <section class="section">
        <div class="blog-controls life-controls reveal">
          <div class="search-box">
            <input type="text" id="life-search" placeholder="搜索文章..." class="search-input" />
          </div>
          <div class="sort-controls">
            <button class="sort-btn active" data-sort="latest">最新优先</button>
            <button class="sort-btn" data-sort="oldest">最早优先</button>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <p class="section-eyebrow">Topics</p>
          <h3>专题文章</h3>
        </div>
        <div id="life-topics-container" class="topics-grid"><!-- 动态生成 --></div>
      </section>

      <section class="section">
        <div class="section-header">
          <p class="section-eyebrow">Articles</p>
          <h3>独立文章</h3>
        </div>
        <div id="life-articles-container" class="articles-grid"><!-- 动态生成 --></div>
      </section>
    </main>

    <footer class="site-footer container">
      <p>© 2026 <span data-i18n="brand.name">元衍极</span> · <span data-i18n="footer.note">始于一元，衍至无极</span></p>
    </footer>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
